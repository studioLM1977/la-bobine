<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Bobine — Suivi de films</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0e12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="La Bobine">
<link rel="icon" href="icons/favicon.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header class="topbar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <circle cx="12" cy="12" r="2.1"/>
        <circle cx="12" cy="5.4" r="1.3"/>
        <circle cx="17.7" cy="9" r="1.3"/>
        <circle cx="15.6" cy="15.7" r="1.3"/>
        <circle cx="8.4" cy="15.7" r="1.3"/>
        <circle cx="6.3" cy="9" r="1.3"/>
      </svg>
      <span>La Bobine</span>
    </div>

    <div class="topbar-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/>
        <path d="m20 20-3.5-3.5"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Rechercher un titre, un réalisateur…" autocomplete="off">
    </div>

    <div class="topbar-actions">
      <button class="btn btn-ghost" id="improvePostersBtn" title="Récupérer les vraies affiches via TMDB">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3M12 18v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M3 12h3M18 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/><circle cx="12" cy="12" r="3"/></svg>
        <span>Affiches</span>
      </button>
      <button class="btn btn-primary" id="openAddBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        <span>Ajouter un film</span>
      </button>
      <div class="avatar-wrap">
        <button class="avatar" id="avatarBtn" aria-label="Réglages">SL</button>
        <div class="settings-popover" id="settingsPopover" hidden>
          <p class="settings-label">Apparence</p>
          <div class="theme-switch" id="themeSwitch">
            <button type="button" class="theme-option" data-theme="dark">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
              Sombre
            </button>
            <button type="button" class="theme-option" data-theme="light">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
              Clair
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="main">

    <section class="section" id="topSection" hidden>
      <div class="section-head">
        <h2>Mes 10 meilleurs films</h2>
      </div>
      <div class="top-strip" id="topStrip"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Ma filmothèque</h2>
        <div class="library-controls">
          <div class="tabs" id="tabs">
            <button class="tab is-active" data-filter="all">Tous <span>0</span></button>
            <button class="tab" data-filter="want">À voir <span>0</span></button>
            <button class="tab" data-filter="watching">En cours <span>0</span></button>
            <button class="tab" data-filter="seen">Vus <span>0</span></button>
            <button class="tab" data-filter="dnf">Abandonnés <span>0</span></button>
          </div>
          <div class="sort-select-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h11M3 12h7M3 17h4"/><path d="m17 5 4 4-4 4M21 9H10"/></svg>
            <select id="sortSelect">
              <option value="recent">Ajout récent</option>
              <option value="title">Titre (A→Z)</option>
              <option value="director">Réalisateur (A→Z)</option>
              <option value="rating">Meilleures notes</option>
              <option value="year">Date de sortie</option>
            </select>
          </div>
        </div>
      </div>
      <div class="movie-grid" id="movieGrid"></div>
      <div class="empty-state" id="emptyState" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <path d="M7 5v14M17 5v14M2 9h5M2 15h5M17 9h5M17 15h5"/>
        </svg>
        <p>Aucun film ici pour le moment.</p>
      </div>
    </section>

  </main>

  <button class="fab" id="fabAddBtn" aria-label="Ajouter un film">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>

</div>

<!-- Modale fiche film -->
<div class="modal-overlay" id="movieModalOverlay">
  <div class="modal movie-modal" role="dialog" aria-modal="true">
    <button class="modal-close" data-close>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="movie-modal-body">
      <div class="movie-modal-cover">
        <img id="mmPoster" src="" alt="">
        <button type="button" class="poster-edit-btn" id="mmPosterEditBtn" aria-label="Modifier l'affiche">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5Z"/></svg>
        </button>
      </div>
      <div class="movie-modal-info">
        <input type="text" class="inline-input director-input" id="mmDirector" placeholder="Réalisateur">
        <input type="text" class="inline-input title-input" id="mmTitle" placeholder="Titre">
        <div class="field-block poster-url-block" id="mmPosterUrlBlock" hidden>
          <label for="mmPosterUrl">URL de l'affiche</label>
          <input type="url" id="mmPosterUrl" placeholder="https://…">
        </div>
        <p class="movie-modal-runtime" id="mmRuntime"></p>

        <div class="genre-tags" id="mmGenres" hidden></div>

        <a href="#" target="_blank" rel="noopener" class="trailer-link" id="mmTrailerLink" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M10 8.5v7l6-3.5-6-3.5Z" fill="currentColor" stroke="none"/></svg>
          <span>Bande-annonce</span>
        </a>

        <div class="field-block synopsis-block" id="mmSynopsisBlock" hidden>
          <label>Synopsis</label>
          <div class="synopsis-body" id="mmSynopsisBody"></div>
        </div>

        <div class="field-block cast-block" id="mmCastBlock" hidden>
          <label>Avec</label>
          <p class="cast-body" id="mmCastBody"></p>
        </div>

        <div class="field-block">
          <label>Statut</label>
          <div class="status-chips" id="mmStatusChips">
            <button class="chip" data-status="want">À voir</button>
            <button class="chip" data-status="watching">En cours</button>
            <button class="chip" data-status="seen">Vu</button>
            <button class="chip" data-status="dnf">Abandonné</button>
          </div>
        </div>

        <div class="field-block" id="mmProgressBlock">
          <label>Progression</label>
          <div class="progress-edit">
            <input type="number" id="mmCurrentMinute" min="0" step="1">
            <span>/ <span id="mmTotalMinutes"></span> min</span>
          </div>
          <div class="progress-track"><div class="progress-fill" id="mmProgressFill"></div></div>
        </div>

        <div class="field-block">
          <label>Note</label>
          <div class="stars" id="mmStars" data-value="0">
            <div class="stars-bg">
              <svg viewBox="0 0 24 24"><use href="#star-icon"/></svg>
              <svg viewBox="0 0 24 24"><use href="#star-icon"/></svg>
              <svg viewBox="0 0 24 24"><use href="#star-icon"/></svg>
              <svg viewBox="0 0 24 24"><use href="#star-icon"/></svg>
              <svg viewBox="0 0 24 24"><use href="#star-icon"/></svg>
            </div>
            <div class="stars-fill" id="mmStarsFill">
              <svg viewBox="0 0 24 24"><use href="#star-icon-fill"/></svg>
              <svg viewBox="0 0 24 24"><use href="#star-icon-fill"/></svg>
              <svg viewBox="0 0 24 24"><use href="#star-icon-fill"/></svg>
              <svg viewBox="0 0 24 24"><use href="#star-icon-fill"/></svg>
              <svg viewBox="0 0 24 24"><use href="#star-icon-fill"/></svg>
            </div>
          </div>
          <span class="stars-value" id="mmStarsValue"></span>
        </div>

        <div class="field-block">
          <label for="mmNotes">Notes personnelles</label>
          <textarea id="mmNotes" rows="4" placeholder="Vos impressions sur ce film…"></textarea>
        </div>

        <div class="field-block similar-block" id="mmSimilarBlock" hidden>
          <label>Films similaires</label>
          <div class="similar-strip" id="mmSimilarStrip"></div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-danger" id="mmDeleteBtn">Supprimer</button>
          <button class="btn btn-primary" id="mmSaveBtn">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modale ajout de film -->
<div class="modal-overlay" id="addModalOverlay">
  <div class="modal add-modal" role="dialog" aria-modal="true">
    <button class="modal-close" data-close>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <h3>Ajouter un film</h3>

    <div class="mode-tabs" id="modeTabs">
      <button type="button" class="mode-tab is-active" data-mode="search">Rechercher</button>
      <button type="button" class="mode-tab" data-mode="manual">Saisie manuelle</button>
    </div>

    <form id="addForm">

      <div id="searchModeBlock">
        <div class="sr-search-field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input type="text" id="srQuery" placeholder="Titre, réalisateur…" autocomplete="off">
        </div>
        <div class="sr-results" id="srResults"></div>

        <div class="sr-selected" id="srSelected" hidden>
          <div class="sr-selected-cover"><img id="srSelPoster" src="" alt=""></div>
          <div class="sr-selected-info">
            <p class="sr-selected-director" id="srSelDirector"></p>
            <p class="sr-selected-title" id="srSelTitle"></p>
            <button type="button" class="link-btn" id="srChangeBtn">‹ Choisir un autre film</button>
          </div>
        </div>
      </div>

      <div id="manualFieldsBlock" hidden>
        <div class="field-block">
          <label for="afTitle">Titre</label>
          <input type="text" id="afTitle" placeholder="Ex. Inception">
        </div>
        <div class="field-block">
          <label for="afDirector">Réalisateur</label>
          <input type="text" id="afDirector" placeholder="Ex. Christopher Nolan">
        </div>
        <div class="field-block">
          <label for="afPoster">URL de l'affiche</label>
          <input type="url" id="afPoster" placeholder="https://…">
        </div>
        <div class="field-block">
          <label for="afYear">Année de sortie (optionnel)</label>
          <input type="number" id="afYear" min="1888" max="2100" placeholder="2010">
        </div>
      </div>

      <div class="field-block" id="runtimeBlock" hidden>
        <label for="afRuntime">Durée (minutes)</label>
        <input type="number" id="afRuntime" min="1" placeholder="148">
      </div>

      <div class="field-block">
        <label>Statut de départ</label>
        <div class="status-chips" id="afStatusChips">
          <button type="button" class="chip is-active" data-status="want">À voir</button>
          <button type="button" class="chip" data-status="watching">En cours</button>
          <button type="button" class="chip" data-status="seen">Vu</button>
          <button type="button" class="chip" data-status="dnf">Abandonné</button>
        </div>
      </div>
      <div class="modal-footer">
        <button type="submit" class="btn btn-primary" id="addSubmitBtn" disabled>Ajouter à ma filmothèque</button>
      </div>
    </form>
  </div>
</div>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <path id="star-icon-path" d="M12 3.5l2.47 5.13 5.53.72-4.03 3.9.98 5.55L12 16.1l-4.95 2.7.98-5.55-4.03-3.9 5.53-.72L12 3.5Z"/>
    <symbol id="star-icon" viewBox="0 0 24 24"><use href="#star-icon-path" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></symbol>
    <symbol id="star-icon-fill" viewBox="0 0 24 24"><use href="#star-icon-path" fill="currentColor"/></symbol>
  </defs>
</svg>

<script src="app.js"></script>
</body>
</html>
